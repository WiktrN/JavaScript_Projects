    <script>

        /*
            Operatory umożliwiają operacje na operandach, niektóre
            operatory operują na jednym a inne na dwóch, czasem nawet
            na trzech operandach. Wyrażenia w języku JavaScript które
            mają na celu uzyskanie jakie wartości są właśnie
            stworzone z operatorów które działają na operandach.
        */

        const name = "Kasia"; // = to operator przypisania

        let num = 6;
        num++;
        num--;

        let result = (2 + 5) * 10; // 2, 5, 10 to operandy
                                   // + oraz * to operatory matematyczne
                                   // 2 + 5 to wyrażenie arytmetyczne dające wartość
        console.log(result); // 70


    </script>
