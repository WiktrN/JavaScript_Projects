<body>
    <script>

    /*
        operator przecinka pozwala na zapisanie wielu wyrażen
        tam gdzie zwykle wpisujemy jedno wyrażenie
    */

    let a = 7, b = 10;

    console.log(a); // 7
    console.log(b); // 10

    for (let i = 0, j = 5; i < 8; i++, j--) {
        console.log(i, j);
    }

    </script>
