<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body{
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>
<body>
    <script>

    /*
        Operatory równości w przypadku sprawdzania obiektów tylko 
        stwierdzają czy dwa obiekty mają ten sam adres w pamięci!
        Wynika to z tego że dany obiekt, a raczej uchwyt do 
        niego może być przechowywany w wielu zmiennych czy stałych,
        bo to typ złożony 
    */

    let a = 10;
    let b = a; // 10 jest skopiowane do zmiennej b
    b++;

    console.log("a: ", a); // 10
    console.log("b: ", b); // 11

    let obj = { a: 10 };
    let data = obj; // data i obj wskazują na to smao miejsce w pamięci
                    // do data została przekazana referencja do obiektu w obj

    obj.a++;

    console.log(obj.a);  // 11
    console.log(data.a); // 11

    if (obj == data) {
        // czy obj wskauzuje na to samo miejsce w pamięci co data
        console.log("wskazuja na to samo miejsce w pamięci");
    } else {
        console.log("nie wskazuje na to samo miejsce w pamięci");
    }

    let info = { a: 12, b: 15 };

    if (obj == info) {
        // czy obj wskauzuje na to samo miejsce w pamięci co info
        console.log("wskazuja na to samo miejsce w pamięci");
    } else {
        console.log("nie wskazuje na to samo miejsce w pamięci");
    }

    </script>
</body>
</html>
