<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body{
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>
<body>
    <script>

    /*
        Inkrementacja i dekrementacja są to jednoargumentowe
        operatory matematyczn zwiększające i zmniejszające
        wartość zminenej o 1
    */

    let n = 10;
    n++; // 11

    console.log(n++); // 11
    console.log(n); // 12
    
    n = 11;

    console.log(++n); // 12
    
    n = 20;
    console.log(n--); // 20
    console.log(n); // 19

    n = 20;

    console.log(--n); // 19
    console.log(n); // 19


    </script>
</body>
</html>
