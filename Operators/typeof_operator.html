<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body{
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>
<body>
    <script>

        /* 
            typeof operator - operator zwracający
            typ wartości w zmiennej lub stałej.
            Typ określony jest jako łańcuch znaków
        */

        console.log( typeof 20 ); // "number"
        console.log( typeof "str" ); // "string"
        console.log( typeof "56" ); // "string"
        console.log( typeof true ); // "boolean"
        console.log( typeof {} ); // "object"
        console.log( typeof { a: "str" } ); // "object"
        console.log( typeof [1,2,3,4] ); // "object"
        console.log( typeof undefined ); // "undefined"
        console.log( typeof 123456n ); // "bigint"
        console.log( typeof Symbol() ); // "symbol"
        console.log( typeof console.log ); // "function"
        console.log( typeof null ); // "object"

        let data = "Kasia";

        if (typeof data === "number" ) {
            console.log(data, " jest liczbą");
        } else if (typeof data === "string") {
            console.log(data, " jest łańcuchem znaków");
        } else if (typeof data === "object") {
            console.log(data, " jest obiektem");
        }
        

    </script>
</body>
</html>
