        /*
            ternary - zadanie
            1. Napisz zmiennę num z wartością 23
            2. W result przypisz wynik operatora ternary za pomocą
                którego sprawdzisz czy num jest większy od 20, jęsli
                tak będzie zwróć wartość "większe", w przeciwnym
                razie "mniejsze"

        */
