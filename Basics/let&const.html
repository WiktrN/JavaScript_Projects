    <script>

        /*
            deklaracja zmiennej - utworzenie nowej zmiennej z jej prawdiłową nazwą (identyfikatorem), 
            dodatkowo możemy do niej przypisać wartość po znaku = 
            Zmienna to pewne pudełko w pamięci przechowujące wartość, 
            JavaScript sam zarządza pamięcią. 
            Oprócz zmiennych możemy tworzyć też stałe korzystające z const
        */

        let a = 10; // utworzenie nowej zmiennej a z wartością 10
        console.log(a); // odwołanie się do wartośći w zmiennej

        a = 100; // przypisanei nowej wartości do zmiennej a
        console.log(a); // 100

        let sum = 10 + a + 20; 
        console.log(sum); // 130

        a = "Wiktor";
        console.log(a); // Wiktor

        const b = "Adam"; // stała
        // b = "Ola"; // TypeError: invalid assignment to const 'b' 

    </script>
