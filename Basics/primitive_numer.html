    <script>

        /*
            number - prymityw czyli typ prostej wartości w JS będący liczbą
        */

        let a = 10;
        let b = 10.50;
        // let c = 10,50; // SyntaxError: missing variable name, got numeric literal
        let c = .50;
        console.log(c);

        let result = (((a + b) * 3) / c) + 15;
        console.log(result); // 138

        console.log(0.1 * 0.2); // 0.020000000000000004

        let hex = 0xf;
        console.log(hex);

    </script>
