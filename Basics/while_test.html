<!DOCTYPE html>

<head>

    <title>Page Title</title>
    <style>
        body{
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>
<body>
    <script>

        /*
            while - zadanie
            1. Zrób pętlę while która pokaże wartości
                od -6 do 6, pamiętaj o inkrementacji
            2. Napisz kolejną pętlę odliczająca
                wartości od 90 do 75
        */

        let a = -6;

        do {
            console.log("a: ", a);
            a++;
        } while (a <= 6);

        let b = 90;

        do {
            console.log("b: ", b);
            b--;
        } while (b >= 75);


    </script>
</body>
