    <script>

        /*
            dynamic typing - dynamiczne typowanie oznacza że w JavaScrpit
            do zmiennej możemy przypsiać dowolną wartość np. string,
            number, boolean itd. Inne języki programowania jak C++
            wymagają aby z góry określony był typ zmiennej,
            JavaScript nie ma takich typów, ale ma typy wartości
            w zmiennych i stałych.
        */

        let data = "Kasia";
        data = 123;
        data = true;
        data = {a: 12};

    </script>
