<body>
    <script>

        /*
            Wyrażenie funkcyjne zadanie
            1. Napisz funkcję anonimową obliczającą
               i zwracającą wynik mnożenia dwóch liczb
            2. Przypisz funkcje do zmiennej "multiply"
               dzięki czemu powstanie wyrażenie
               funkcyjne
            3. Wywoałj funkcję z argumentami 3 i 6,
               pokaż wynik w konsoli
            4. Przypisz funkcję do zmiennej test
               i wywołaj ją z argumentami 10 i 25,
               zaprezentuj wynik w konsoli
        */

        let multiply = function (a, b) {
            return a * b;
        }

        console.log(multiply(3, 6)); // 18

        let test = multiply;

        console.log(test(10, 25)); // 250



    </script>
