<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body{
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>
<body>
    <script>

        /*
            W JavaScript możemy utworzyć globalne zmienne / stałe czyli będą
            dostępne w całym programie.
            Natomiast zmienne / stałe lokalne o zasięgu bloku kodu
            utworzymy z let i const. W bloku kodu można również powołać
            nową zmienną / stała o tej samej nazwie co globalna
            i przesłoni ja w tym bloku, będzie inną wartością.
        */

        let a = 10;
        const txt = "Asia";

        if (true) {
            let a = 100;    // zmienne lokalne
            let txt = "Zosia"; // które przesłaniaja globalne o tej samej nazwie

            console.log(a); // 100
            console.log(txt); // Zosia
        }

        console.log(a); // 10
        console.log(txt); // Asia

        for (let i = 0; i < 3; i++) {
            let a = 56;
            console.log("for", i, a );
        }

    </script>
</body>
</html>
