<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body{
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>
<body>
    <script>

        /*
            Koercja to automatyczna konwersja typu wartości w JavaScript
            gdy wymaga tego sytuacja.
        */

        // Konwersje jawne

        let txt = String(123);
        console.log(typeof txt); // "string"

        let num = parseInt("54353");
        console.log(typeof num); // "number"

        let num2 = parseFloat("1278157.517685");
        console.log(num2);
        console.log(typeof num2);

        // Konwersje niejawne - koercje
        let data = "txt" + 123;
        console.log(data); // "txt123"

        let info = "10";

        console.log(info + 2) // "102"

        // "102" == 12
        if (info + 2 == 12) {
            console.log("!");
        } 

        let d = +"100";
        console.log(typeof d); // "number"
        
        d = -"100";
        console.log(typeof d); // "number"
        console.log(d);

        if ("false") console.log("wykona się"); // true 
        if (" ") console.log("wykona się"); // true 
        
        if ("") console.log("nie wykona się"); // false 
        if ("0") console.log("wykona się"); // true 
        if ("!0") console.log("nie wykona się"); // false 

        if ({}) console.log("wykona się"); // true

        if ({a: 10} == "[object Object]") console.log("wykona się") // true
        console.log( String({a: 10})); // Konwersja jawna na string!
                                       // [object Object]
        
    </script>
</body>
</html>
