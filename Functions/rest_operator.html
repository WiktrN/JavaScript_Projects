<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body{
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>
<body>
    <script>

        /*
            Operator rest zbiera wszystkie przekazane argumenty
            do funkcji w tablicę np.
            function foo(...params) {}
        */

        function foo(...params) {
            console.log(params); // [1,2,3,4,5,6,7,8]
        }

        foo(1,2,3,4,5,6,7,8);
        
    </script>
</body>
</html>
