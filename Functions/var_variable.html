<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body{
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>
<body>
    <script>

        /*
            Zmienna var
            Zanim w ES20215/ES6 wprowadzono słowa kluczowe let i const
            w JavaScript mieliśmy tylko dostępne var do tworzenia
            zmiennych. Taka zmienna nie ma zasięgu blokowego!
        */

        var a = 10;
        
        if (true) {
            var a = 23; // nadpisanie globalnej deklaracji zmiennej a
            console.log(a); // 23

            var b = 100;
        }
    
        console.log(a); // 23
        console.log(b); // 100

    </script>
</body>
</html>
