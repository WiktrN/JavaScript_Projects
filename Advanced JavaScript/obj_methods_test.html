<!DOCTYPE html>
<html lang="EN">

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body {
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>

<body>
    <script>

        /*
            Zadanie z metodami obiektu
            1. Napisz obiekt opisujący szkołę
               z jej nazwą, miastem oraz pustą tablicą,
               gdzie będą studenci
            2. Dodaj metodę do utworzenia studenta
               na podstawie imienia i nazwiska addStudent().
               Metoda ta doda obiekt studenta do tablicy studentów.
            3. Napisz metodę showStudents() która pokaże
               w konsoli wszystkich studentów. Jeżeli ilość
               studentów jest 0 to pokaż informację, że
               szkoła nie ma studentów
            4. Dodaj metodę showStudentsByName() która przyjmie 
               parametr name pokazująca studentów tylko
               z określonym imieniem w konsoli
            5. Napisz metodę getNumStudents() która zwróci
               ilość studentów
            6. Dodaj metodę resetStudents() która skasuje
               studentów, po prostu przypisz pustą tablicę
               do tablicy studenów
            7. Dodaj kilku studentów (dwóch z tym samym imieniem)
               i pokaż wszystkich w konsoli.
               Następnie pokaż powtarzających się studentów z tym
               samym imieniem.
               Pokaż ilośc studentów, zresetuj ich i ponownie
               pokaż w konsoli ich ilość.
        */

        const school = {
            name: "name",
            city: "city",
            students: [],
            
            addStudent: function (name, surname) {
                const obj = {
                    name: name,
                    surname: surname,
                };
                this.students[this.students.length] = obj;
            },

            showStudents: function () {
                if (this.students.length == 0) {
                    console.log("Szkoła nie ma studentów");
                    return
                }

                for (let i = 0; i < this.students.length; i++){
                    const s = this.students[i];
                    console.log(s.name, s.surname);
                }

            },

            showStudentsByName: function (name) {
                console.log("Studenci o imieniu",name )
                for (let i = 0; i < this.students.length; i++) {
                    const s = this.students[i];

                    if (s.name === name) 
                        console.log(s.name, s.surname);
                };
            },

            getNumStudents: function (){
                console.log("Liczba wszystich studentów wynosi:", this.students.length);
            },

            resetStudents: function () {
                this.students = [];
            },
        }

        school.addStudent("Adam", "Kowalski");
        school.addStudent("Klaudia", "Kot");
        school.addStudent("Adam", "Ząbek");
        school.addStudent("Kamil", "Stoch");
        school.addStudent("Stefan", "Kwiatek");

        school.showStudents();

        school.showStudentsByName("Adam");

        school.getNumStudents();

        school.resetStudents();
        school.showStudents();

    </script>
</body>

</html>
