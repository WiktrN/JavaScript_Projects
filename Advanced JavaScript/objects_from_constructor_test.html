        function Magazine(title){
            this.title = title;
            this.adverts = [];
            
            this.addAdvert = function(name, page){
                this.adverts.push({
                    name: name,
                    page: page
                });
            };
            
            this.printAdvert = function(){
                for (let i = 0; i < this.adverts.length; i++){
                    const a = this.adverts[i];
                    console.log("Advert:", a.name, a.page);
                };
            };
        };

        const magazine = new Magazine("Daily Bugle");
        console.log(magazine);

        magazine.addAdvert("Spider Man",1);
        magazine.addAdvert("Avengers",5);
        magazine.addAdvert("Higher Taxes",10);
        magazine.printAdvert();
