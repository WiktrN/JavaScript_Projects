<!DOCTYPE html>
<html lang="EN">

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <style>
        body {
            background: black;
            color: white;
        }

        * {
            margin: 20px 2px;
        }
    </style>
</head>

<body>
    <script>

        /*
            IIFE - Immediately Invoked Function Expression to funkcja
            natychmiastowa, również anonimowa. Ogranicza dostęp
            do zmiennych i funkcji tylko do niej, czyli nie zaśmieca
            globalnymi danymi naszego programu.
        */

        if (true) {
            var a = 5;
        }

        console.log(a); // 5

        (function (data) {
            console.log(data);
            var b = 10;
            console.log(b);
        })("test");

        // console.log(b); // ReferenceError: b is not defined

    </script>
</body>

</html>
